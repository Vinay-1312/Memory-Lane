<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Lane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
      <h1 class="hud-title">Memory Lane</h1>
      <div class="hud-controls">
        <span>W / ↑ &nbsp; drive</span>
        <span>S / ↓ &nbsp; brake</span>
        <span>A D / ← → &nbsp; steer</span>
      </div>
    </div>

    <!-- Memory card overlay (appears when near a frame) -->
    <div id="memory-overlay" class="memory-overlay">
      <div id="overlay-media" class="overlay-media"></div>
      <div class="overlay-info">
        <p id="overlay-date" class="overlay-date"></p>
        <p id="overlay-desc" class="overlay-desc"></p>
      </div>
    </div>

    <!-- River splash tint -->
    <div id="splash-overlay" class="splash-overlay"></div>

    <!-- Fun collision notification -->
    <div id="fun-notif" class="fun-notif"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
